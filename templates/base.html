<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LeadGen AI{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f8f9fa; }
    .navbar { background: #1a1a2e !important; }
    .navbar-brand, .nav-link { color: #e0e0e0 !important; }
    .nav-link:hover { color: #fff !important; }
    .stat-card { border-left: 4px solid #0d6efd; }
    .badge-new { background: #6c757d; }
    .badge-enriched { background: #0dcaf0; }
    .badge-emails_written { background: #6610f2; }
    .badge-contacted { background: #0d6efd; }
    .badge-followed_up_1 { background: #fd7e14; }
    .badge-followed_up_2 { background: #dc3545; }
    .badge-replied { background: #198754; }
    .badge-unsubscribed { background: #6c757d; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">LeadGen AI</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/leads">Leads</a>
      <a class="nav-link" href="/run">Run Campaign</a>
    </div>
  </div>
</nav>
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'danger' if cat == 'error' else 'success' }} alert-dismissible fade show">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
